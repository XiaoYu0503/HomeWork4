# 將此檔案複製為 .streamlit/secrets.toml 並填入你的金鑰
# 請勿把真實金鑰提交到 Git（本 repo 的 .gitignore 已排除 secrets.toml）
OPENAI_API_KEY = "sk-xxxx"  # 佔位符，請在本地 secrets.toml 中放真正金鑰
OPENAI_BASE_URL = "https://api.openai.com/v1"
OPENAI_MODEL = "gpt-4o-mini"
LOCAL_LLM_PROVIDER = ""  # 可填 ollama 或 lmstudio 以在無金鑰時使用本地模型
LOCAL_LLM_MODEL = ""     # 例如 ollama: llama3.1:8b-instruct / lmstudio: gpt-3.5-turbo
